<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab.com</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0e0e11;
--panel:#1a1a1f;
--soft:#22232a;
--text:#e8e8ea;
--muted:#9a9aa3;
--border:#2d2e36;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* LANDING */

#welcomeScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
}

#startBtn{
margin-top:40px;
padding:14px 50px;
border-radius:40px;
border:1px solid var(--border);
background:var(--panel);
color:var(--text);
cursor:pointer;
}

/* CHAT */

#appScreen{
display:none;
flex-direction:column;
height:100vh;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid var(--border);
}

#chatArea{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:85%;
padding:12px 14px;
border-radius:14px;
font-size:14px;
}

.lab{background:var(--panel);}
.user{background:var(--soft);align-self:flex-end;}

.openBtn{
margin-top:8px;
padding:6px 14px;
background:white;
color:black;
border:none;
border-radius:20px;
font-size:12px;
}

#inputArea{
border-top:1px solid var(--border);
padding:15px;
display:flex;
gap:10px;
}

#userInput{
flex:1;
background:var(--panel);
border:1px solid var(--border);
border-radius:25px;
padding:12px 16px;
color:var(--text);
resize:none;
}

#sendBtn{
width:42px;
height:42px;
border-radius:50%;
border:none;
background:white;
}

/* STUDIO MOBILE */

#studioScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
flex-direction:column;
}

.studioHeader{
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#111;
color:white;
}

.iconBtn{
width:36px;
height:36px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#studioFrame{
flex:1;
border:none;
width:100%;
}

/* EDITOR PANEL */

#editorPanel{
position:absolute;
top:55px;
right:-100%;
width:60%;
height:calc(100% - 55px);
background:var(--panel);
transition:.3s;
display:flex;
flex-direction:column;
border-left:1px solid var(--border);
}

#editorPanel.active{
right:0;
}

#editorArea{
flex:1;
background:var(--soft);
color:var(--text);
border:none;
padding:15px;
resize:none;
outline:none;
font-family:monospace;
font-size:13px;
}

#editorActions{
padding:10px;
display:none;
gap:10px;
}

.actionBtn{
flex:1;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.save{background:white;color:black;}
.cancel{background:#333;color:white;}

</style>
</head>

<body>

<section id="welcomeScreen">
<h2>Lab.com</h2>
<button id="startBtn">Iniciar</button>
</section>

<section id="appScreen">
<header>LAB</header>
<main id="chatArea">
<div class="message lab">Olá. Eu sou o Lab.</div>
</main>
<footer id="inputArea">
<textarea id="userInput" placeholder="Cole seu código..."></textarea>
<button id="sendBtn">➤</button>
</footer>
</section>

<section id="studioScreen">
<div class="studioHeader">
<div class="iconBtn" id="backBtn">←</div>
<div class="iconBtn" id="editBtn">✎</div>
</div>
<iframe id="studioFrame" sandbox="allow-scripts"></iframe>
</section>

<div id="editorPanel">
<textarea id="editorArea"></textarea>
<div id="editorActions">
<button class="actionBtn save">Salvar</button>
<button class="actionBtn cancel">Cancelar</button>
</div>
</div>

<script>

let currentCode="";
let editedCode="";

const welcome=document.getElementById("welcomeScreen");
const app=document.getElementById("appScreen");
const studio=document.getElementById("studioScreen");
const frame=document.getElementById("studioFrame");
const editorPanel=document.getElementById("editorPanel");
const editorArea=document.getElementById("editorArea");
const actions=document.getElementById("editorActions");

document.getElementById("startBtn").onclick=()=>{
welcome.style.display="none";
app.style.display="flex";
};

document.getElementById("sendBtn").onclick=()=>{
const text=document.getElementById("userInput").value.trim();
if(!text) return;
currentCode=text;
addMessage("user",text);
addOpen();
document.getElementById("userInput").value="";
};

function addMessage(type,text){
const div=document.createElement("div");
div.classList.add("message",type);
div.textContent=text;
document.getElementById("chatArea").appendChild(div);
}

function addOpen(){
const div=document.createElement("div");
div.classList.add("message","lab");
div.innerHTML='Código analisado.<br><button class="openBtn" onclick="openStudio()">Abrir</button>';
document.getElementById("chatArea").appendChild(div);
}

function openStudio(){
app.style.display="none";
studio.style.display="flex";
frame.srcdoc=currentCode;
}

document.getElementById("backBtn").onclick=()=>{
studio.style.display="none";
app.style.display="flex";
};

document.getElementById("editBtn").onclick=()=>{
editorPanel.classList.toggle("active");
editorArea.value=currentCode;
editedCode=currentCode;
actions.style.display="none";
};

editorArea.addEventListener("input",()=>{
if(editorArea.value!==currentCode){
actions.style.display="flex";
}else{
actions.style.display="none";
}
});

document.querySelector(".save").onclick=()=>{
currentCode=editorArea.value;
frame.srcdoc=currentCode;
actions.style.display="none";
editorPanel.classList.remove("active");
};

document.querySelector(".cancel").onclick=()=>{
editorArea.value=currentCode;
actions.style.display="none";
editorPanel.classList.remove("active");
};

</script>

</body>
</html>
