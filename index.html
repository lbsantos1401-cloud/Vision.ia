<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>AR RC V0.3</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

#enterAR{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
z-index:999;

padding:15px 30px;

border:none;
border-radius:10px;

font-size:18px;

background:#ff3b30;
color:white;
}

#controls{

position:fixed;

bottom:120px;

width:100%;

display:none;

justify-content:center;

gap:20px;

z-index:9999;

}

#controls button{

width:70px;
height:70px;

font-size:30px;

border:none;

border-radius:50%;

background:white;

opacity:0.8;

}

</style>
</head>

<body>

<button id="enterAR">
Entrar em AR
</button>

<div id="controls">

<button id="left">
◀
</button>

<button id="forward">
▲
</button>

<button id="right">
▶
</button>

</div>

<script type="module" src="./main.js"></script>

</body>
</html>
