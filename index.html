<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Agent — Protótipo</title>
  <style>
    body{
      margin:0;
      font-family:system-ui, sans-serif;
      background:#0f0f12;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .card{
      background:#1c1c22;
      padding:24px;
      border-radius:16px;
      max-width:420px;
      text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,.6);
    }
    button{
      margin-top:16px;
      padding:12px 20px;
      border:none;
      border-radius:999px;
      background:#6c4cff;
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎥 Live Agent</h1>
    <p>Protótipo inicial de um agente com visão de tela e assistência ao vivo.</p>
    <button onclick="alert('Protótipo ativo')">
      Iniciar
    </button>
  </div>
</body>
</html>
