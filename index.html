<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab.com</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0e0e11;
--panel:#17171c;
--soft:#1f1f25;
--text:#e8e8ea;
--muted:#8a8a92;
--border:#2a2a32;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
background:var(--bg);
color:var(--text);
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* LANDING */

#welcomeScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:42px;
letter-spacing:3px;
display:flex;
align-items:center;
gap:4px;
}

.logo svg{width:26px;height:26px;fill:white;}

.subtitle{
margin-top:25px;
font-size:15px;
color:var(--muted);
max-width:300px;
line-height:1.6;
}

.vision{
margin-top:20px;
font-size:13px;
color:#555;
max-width:260px;
}

#startBtn{
margin-top:40px;
padding:14px 50px;
border-radius:40px;
border:1px solid var(--border);
background:var(--panel);
color:var(--text);
font-size:14px;
cursor:pointer;
transition:.3s;
}

#startBtn:hover{background:var(--soft);}

/* CHAT */

#appScreen{
display:none;
flex-direction:column;
height:100vh;
transition:.4s ease;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-bottom:1px solid var(--border);
font-family:'Orbitron',sans-serif;
letter-spacing:2px;
}

#chatArea{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:85%;
padding:12px 14px;
border-radius:14px;
font-size:14px;
line-height:1.5;
}

.lab{background:var(--panel);align-self:flex-start;}
.user{background:var(--soft);align-self:flex-end;}

.openBtn{
margin-top:8px;
padding:6px 14px;
background:white;
color:black;
border:none;
border-radius:20px;
cursor:pointer;
font-size:12px;
}

/* INPUT */

#inputArea{
border-top:1px solid var(--border);
padding:15px;
background:var(--bg);
display:flex;
gap:10px;
}

#userInput{
flex:1;
background:var(--panel);
border:1px solid var(--border);
border-radius:25px;
padding:12px 16px;
color:var(--text);
resize:none;
outline:none;
font-size:14px;
}

#sendBtn{
width:42px;
height:42px;
border-radius:50%;
border:none;
background:white;
cursor:pointer;
font-size:18px;
}

/* STUDIO */

#studioScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg);
display:none;
flex-direction:column;
animation:fadeIn .4s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

.studioHeader{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid var(--border);
}

.studioBody{
flex:1;
display:flex;
}

.codeView{
width:50%;
background:#111;
color:#0f0;
padding:20px;
overflow:auto;
font-family:monospace;
white-space:pre-wrap;
}

#studioFrame{
width:50%;
border:none;
background:white;
}

.iconBtn{
width:36px;
height:36px;
border-radius:50%;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* MODAL */

#editorModal{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
width:80%;
height:80%;
background:var(--panel);
display:flex;
flex-direction:column;
padding:20px;
}

#editorArea{
flex:1;
background:#111;
color:#0f0;
border:none;
outline:none;
resize:none;
font-family:monospace;
padding:10px;
}

</style>
</head>

<body>

<section id="welcomeScreen">
<div class="logo">
Lab
<svg viewBox="0 0 24 24">
<path d="M9 2v2l-4 7v9a2 2 0 002 2h10a2 2 0 002-2v-9l-4-7V2H9z"/>
</svg>
b.com
</div>
<p class="subtitle">Um laboratório digital para executar e evoluir código.</p>
<p class="vision">Explorando o futuro da engenharia assistida por IA.</p>
<button id="startBtn">Iniciar</button>
</section>

<section id="appScreen">
<header>LAB</header>
<main id="chatArea">
<div class="message lab">Olá. Eu sou o Lab.</div>
</main>
<footer id="inputArea">
<textarea id="userInput" rows="1" placeholder="Cole seu código..."></textarea>
<button id="sendBtn">➤</button>
</footer>
</section>

<section id="studioScreen">
<div class="studioHeader">
<div class="iconBtn" id="backBtn">←</div>
<div class="iconBtn" id="editBtn">✎</div>
</div>
<div class="studioBody">
<div class="codeView" id="codeView"></div>
<iframe id="studioFrame" sandbox="allow-scripts"></iframe>
</div>
</section>

<div id="editorModal">
<div class="modalContent">
<textarea id="editorArea"></textarea>
<button id="saveEdit">Salvar e Executar</button>
</div>
</div>

<script>

let currentCode = "";

const welcome = document.getElementById("welcomeScreen");
const app = document.getElementById("appScreen");
const studio = document.getElementById("studioScreen");
const chatArea = document.getElementById("chatArea");
const userInput = document.getElementById("userInput");

document.getElementById("startBtn").onclick = ()=>{
welcome.style.display="none";
app.style.display="flex";
};

document.getElementById("sendBtn").onclick = ()=>{
const text = userInput.value.trim();
if(!text) return;

currentCode = text;

addMessage("user", text);
addOpenButton();

userInput.value="";
};

function addMessage(type,text){
const div=document.createElement("div");
div.classList.add("message",type);
div.textContent=text;
chatArea.appendChild(div);
chatArea.scrollTop=chatArea.scrollHeight;
}

function addOpenButton(){
const div=document.createElement("div");
div.classList.add("message","lab");
div.innerHTML='Código analisado.<br><button class="openBtn" onclick="openStudio()">Abrir</button>';
chatArea.appendChild(div);
}

function openStudio(){
app.style.display="none";
studio.style.display="flex";

document.getElementById("codeView").textContent=currentCode;
executeStudio(currentCode);
}

function executeStudio(code){
const frame=document.getElementById("studioFrame");
const doc=frame.contentDocument||frame.contentWindow.document;
doc.open();
doc.write(code);
doc.close();
}

document.getElementById("backBtn").onclick=()=>{
studio.style.display="none";
app.style.display="flex";
};

document.getElementById("editBtn").onclick=()=>{
document.getElementById("editorModal").style.display="flex";
document.getElementById("editorArea").value=currentCode;
};

document.getElementById("saveEdit").onclick=()=>{
currentCode=document.getElementById("editorArea").value;
document.getElementById("editorModal").style.display="none";
document.getElementById("codeView").textContent=currentCode;
executeStudio(currentCode);
};

</script>

</body>
</html>
